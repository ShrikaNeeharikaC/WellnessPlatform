version: '3.9'

# =============================================================================
# WellnessPlatform — Production compose
# Usage: docker-compose up --build
# =============================================================================

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: wellness_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-wellness_db}
      POSTGRES_USER:     ${POSTGRES_USER:-wellness_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wellness_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # SQL files run in alphabetical order on first start
      - ./database/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/02_indexes.sql:/docker-entrypoint-initdb.d/02_indexes.sql:ro
      - ./database/03_seed.sql:/docker-entrypoint-initdb.d/03_seed.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wellness_user} -d ${POSTGRES_DB:-wellness_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - wellness_net

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wellness_backend
    restart: unless-stopped
    environment:
      DATABASE_URL:                 postgresql://${POSTGRES_USER:-wellness_user}:${POSTGRES_PASSWORD:-wellness_pass}@db:5432/${POSTGRES_DB:-wellness_db}
      SECRET_KEY:                   ${SECRET_KEY:-change-me-in-production-min-32-chars!!}
      ALGORITHM:                    HS256
      ACCESS_TOKEN_EXPIRE_MINUTES:  ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS:    ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      CORS_ORIGINS:                 ${CORS_ORIGINS:-http://localhost}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wellness_net

  # ── React Frontend (nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # API calls go through nginx proxy — no external URL needed in prod
        REACT_APP_API_URL: /api/v1
    container_name: wellness_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - wellness_net

# =============================================================================
volumes:
  postgres_data:

networks:
  wellness_net:
    driver: bridge
