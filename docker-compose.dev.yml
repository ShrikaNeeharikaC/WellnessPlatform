version: '3.9'

# =============================================================================
# WellnessPlatform — Development overrides (hot reload)
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# =============================================================================

services:

  backend:
    volumes:
      # Mount source for live reload
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DEBUG: "true"

  frontend:
    # Override with the dev Node server instead of nginx
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      REACT_APP_API_URL: http://localhost:8000/api/v1
      CHOKIDAR_USEPOLLING: "true"   # needed inside Docker on Windows/Mac
    command: npm start
